<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#11644f" />
    <title>AtendePix offline</title>
    <style>
      :root {
        color: #202820;
        background: #f7f8f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-width: 320px;
        margin: 0;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      section {
        width: min(100%, 420px);
        border: 1px solid #dfe4da;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
      }

      h1 {
        margin: 0;
        color: #11644f;
        font-size: 1.375rem;
      }

      p {
        margin: 12px 0 0;
        color: #465047;
        line-height: 1.55;
      }

      button {
        margin-top: 20px;
        border: 0;
        border-radius: 6px;
        background: #11644f;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Sem conexao</h1>
        <p>O AtendePix esta sem acesso a internet agora. Verifique a conexao e tente novamente.</p>
        <button type="button" onclick="window.location.reload()">Tentar novamente</button>
      </section>
    </main>
  </body>
</html>

services:
  postgres:
    image: postgres:16-alpine
    container_name: atende-pix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atende_pix
      POSTGRES_PASSWORD: atende_pix
      POSTGRES_DB: atende_pix
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atende_pix -d atende_pix']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atende-pix-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
